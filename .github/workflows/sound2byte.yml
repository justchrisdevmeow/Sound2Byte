name: sound2bytebeat

on:
  push:
    paths:
      - '*.mp3'
      - '*.wav'
      - '*.flac'
      - '*.ogg'
      - '*.m4a'
      - '*.aac'
  workflow_dispatch:
    inputs:
      audio_file:
        description: 'Audio filename (e.g., song.mp3)'
        required: true
        type: string

jobs:
  convert:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pydub
        sudo apt-get update
        sudo apt-get install -y ffmpeg
    
    - name: Run sound2bytebeat (pushed file)
      if: github.event_name == 'push'
      run: |
        for file in *.mp3 *.wav *.flac *.ogg *.m4a *.aac; do
          if [ -f "$file" ]; then
            echo "Processing: $file"
            python sound2bytebeat.py "$file"
          fi
        done
    
    - name: Run sound2bytebeat (manual trigger)
      if: github.event_name == 'workflow_dispatch'
      run: |
        python sound2bytebeat.py "${{ inputs.audio_file }}"
    
    - name: Upload formula
      uses: actions/upload-artifact@v4
      with:
        name: bytebeat-formula
        path: bytebeat_formula.txt

name: sound2byte

on:
  push:
    paths:
      - '*.mp3'
      - '*.wav'
      - '*.flac'
      - '*.ogg'
  workflow_dispatch:
    inputs:
      audio_file:
        description: 'Audio file name'
        required: true
        type: string

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          pip install pydub
          sudo apt-get install -y ffmpeg
      - name: Run
        run: python sound2byte.py "${{ inputs.audio_file || 'sound.mp3' }}"
      - uses: actions/upload-artifact@v4
        with:
          name: formula
          path: formula.txt
